workflows:
  ios-kmp-windows-user:
    name: Build Unsigned iOS IPA for Windows Sideloading
    max_build_duration: 40
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj" 
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Initialize Gradle Wrapper
        script: |
          chmod +x gradlew
          ./gradlew --version
      - name: Resolve Swift Package Dependencies
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath SourcePackages
      - name: Build Unsigned iOS App Binary
        script: |
          # Use 'build' instead of archive to circumvent final profile checks
          xcodebuild build -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -clonedSourcePackagesDirPath SourcePackages \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO
      - name: Package into IPA Container
        script: |
          mkdir -p build/ios/ipa/Payload
          # Dynamic copy path to catch the generated target binary folder name
          cp -r build/ios/DerivedData/Build/Products/Release-iphoneos/*.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r unsigned_app.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
